services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      JOB_AGENT_ENV: development
      JOB_AGENT_LOG_LEVEL: INFO
      JOB_AGENT_VERSION: 0.0.0
    ports:
      - "8000:8000"
